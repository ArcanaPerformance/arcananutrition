function pct(start, current, target) {
  const total = Math.abs(target - start);

function downloadCSV(shopping) {
  let csv = 'Catégorie,Aliment,Quantité,Acheté\n';
  shopping.forEach(cat => {
    cat.items.forEach(item => {
      csv += `"${cat.cat}","${item.name}","${item.qty}","${item.done ? 'Oui' : 'Non'}"\n`;
    });
  });
  const blob = new Blob([csv], { type:'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = 'arcana-courses.csv'; a.click();
}

function WeightChart({ history, target }) {
  if (!history || history.length < 2) return null;
  const W = 420, H = 140, PAD = { t:10, r:10, b:30, l:36 };
  const vals = history.map(h => h.w);
  const minV = Math.min(...vals, target) - 0.5;
  const maxV = Math.max(...vals) + 0.5;
  const xScale = i => PAD.l + (i / (history.length - 1)) * (W - PAD.l - PAD.r);
  const yScale = v => PAD.t + ((maxV - v) / (maxV - minV)) * (H - PAD.t - PAD.b);
  const pts = history.map((h,i) => `${xScale(i)},${yScale(h.w)}`).join(' ');
  const targetY = yScale(target);
  const last = history[history.length - 1];
  return (
    <svg viewBox={`0 0 ${W} ${H}`} className="w-full" style={{height:140}}>
      <defs>
        <linearGradient id="lineGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="#0DC9AA" stopOpacity="0.4"/>
          <stop offset="100%" stopColor="#0DC9AA" stopOpacity="0"/>
        </linearGradient>
      </defs>
      {/* Grid lines */}
      {[0,1,2,3].map(i => {
        const y = PAD.t + i * (H - PAD.t - PAD.b) / 3;
        const v = (maxV - (i / 3) * (maxV - minV)).toFixed(1);
        return <g key={i}>
          <line x1={PAD.l} y1={y} x2={W - PAD.r} y2={y} stroke="rgba(255,255,255,0.06)" strokeWidth="1"/>
          <text x={PAD.l - 4} y={y + 4} textAnchor="end" fontSize="9" fill="rgba(255,255,255,0.35)">{v}</text>
        </g>;
      })}
      {/* Target line */}
      <line x1={PAD.l} y1={targetY} x2={W - PAD.r} y2={targetY} stroke="#10B981" strokeWidth="1" strokeDasharray="4,3"/>
      <text x={W - PAD.r + 2} y={targetY + 4} fontSize="8" fill="#10B981">Obj</text>
      {/* Area fill */}
      <polygon
        points={`${xScale(0)},${H - PAD.b} ${pts} ${xScale(history.length-1)},${H - PAD.b}`}
        fill="url(#lineGrad)"
      />
      {/* Line */}
      <polyline points={pts} fill="none" stroke="#2DD4BF" strokeWidth="2" strokeLinejoin="round"/>
      {/* Dots */}
      {history.map((h,i) => (
        <circle key={i} cx={xScale(i)} cy={yScale(h.w)} r="3" fill="#0DC9AA" stroke="#0D0D1A" strokeWidth="1.5"/>
      ))}
      {/* Last value label */}
      <text x={xScale(history.length-1)} y={yScale(last.w) - 7} textAnchor="middle" fontSize="10" fontWeight="bold" fill="#A78BFA">{last.w}</text>
      {/* X labels (every 2) */}
      {history.filter((_,i) => i % 2 === 0).map((h,i) => (
        <text key={i} x={xScale(i*2)} y={H - PAD.b + 12} textAnchor="middle" fontSize="8" fill="rgba(255,255,255,0.3)">{h.date}</text>
      ))}
    </svg>
  );
}

// ─── PLAYER TRACKING ──────────────────────────────────────────────────────────

function PlayerTracking({ user, lang }) {
  const [newWeight, setNewWeight] = useState('');
  const [form, setForm] = useState(user.todayForm || 7);
  const [hydration, setHydration] = useState(user.todayHydration || 1.5);
  const [history, setHistory] = useState(user.weightHistory);
  const [saved, setSaved] = useState(false);
  const lastW = history[history.length - 1].w;
  const progress = pct(user.weight_start, lastW, user.weight_target);
  const diff = (lastW - user.weight_start).toFixed(1);
  const days = daysSince(user.startDate);
  const hydGoal = user.hydrationGoal || 2.5;
  const hydPct = Math.min(100, Math.round((hydration / hydGoal) * 100));

  function saveEntry() {
    if (!newWeight) return;
    const next = [...history, { date:'29/06', w:parseFloat(newWeight) }];
    setHistory(next);
    setNewWeight('');
    setSaved(true);
    setTimeout(() => setSaved(false), 2000);
  }
  const formEmoji = form >= 9 ? '🚀' : form >= 7 ? '💪' : form >= 5 ? '😐' : '😴';
  const hydEmoji = hydPct >= 100 ? '💧✅' : hydPct >= 60 ? '💧' : '🫙';

  return (
    <div className="fade-in space-y-4">
      <div className="flex justify-between items-baseline">
        <h2 className="text-lg font-bold">{t('tracking',lang)}</h2>
        {days !== null && <span className="text-xs text-agold">Depuis {days} jours</span>}
      </div>

      {/* Stats */}
      <div className="grid grid-cols-2 gap-3">
        {[
          { label:'Poids départ', val:`${user.weight_start} kg`, color:'text-gray-300', sub: user.startDate ? new Date(user.startDate).toLocaleDateString('fr-FR',{day:'numeric',month:'short'}) : '' },
          { label:'Poids actuel', val:`${lastW} kg`, color:'text-apurpl', sub:'aujourd\'hui' },
          { label:'Objectif', val:`${user.weight_target} kg`, color:'text-agreen', sub:`encore ${Math.abs((lastW-user.weight_target).toFixed(1))} kg` },
          { label:'Évolution totale', val:`${diff > 0 ? '+' : ''}${diff} kg`, color: diff < 0 ? 'text-agreen' : 'text-ared', sub: days ? `en ${days} jours` : '' },
        ].map(s => (
          <div key={s.label} className="bg-acard rounded-2xl p-4">
            <p className="text-xs text-gray-400 mb-0.5">{s.label}</p>
            <p className={`text-2xl font-black ${s.color}`}>{s.val}</p>
            {s.sub && <p className="text-xs text-gray-500 mt-0.5">{s.sub}</p>}
          </div>
        ))}
      </div>

      {/* Progress */}
      <div className="bg-acard rounded-2xl p-4">
        <div className="flex justify-between text-sm mb-2">
          <span className="text-gray-400">Progression vers l'objectif</span>
          <span className="font-bold text-agreen">{progress}%</span>
        </div>
        <div className="h-3 bg-acard2 rounded-full overflow-hidden">
          <div className="h-full rounded-full transition-all" style={{width:`${progress}%`,background:'linear-gradient(90deg,#0DC9AA,#10B981)'}}/>
        </div>
        {days && <p className="text-xs text-gray-500 mt-1.5">{progress}% atteint en {days} jours · rythme : {(Math.abs(diff)/days*7).toFixed(2)} kg/sem.</p>}
      </div>

      {/* Chart */}
      <div className="bg-acard rounded-2xl p-4">
        <p className="text-xs text-gray-400 uppercase tracking-wider mb-2">Courbe de poids</p>
        <WeightChart history={history} target={user.weight_target}/>
      </div>

      {/* Hydration */}
      <div className="bg-acard rounded-2xl p-4">
        <div className="flex justify-between items-center mb-3">
          <p className="text-sm font-semibold">{hydEmoji} Hydratation du jour</p>
          <span className={`text-sm font-bold ${hydPct>=100?'text-agreen':hydPct>=60?'text-agold':'text-ared'}`}>{hydration.toFixed(1)} / {hydGoal} L</span>
        </div>
        <div className="h-3 bg-acard2 rounded-full overflow-hidden mb-3">
          <div className="h-full rounded-full transition-all" style={{width:`${hydPct}%`,background: hydPct>=100?'#10B981':hydPct>=60?'#F59E0B':'#EF4444'}}/>
        </div>
        <div className="flex items-center gap-3">
          <input type="range" min="0" max={hydGoal*2} step="0.1" value={hydration}
            onChange={e=>setHydration(parseFloat(e.target.value))}
            className="flex-1" style={{accentColor:'#0DC9AA'}}/>
          <div className="flex gap-1">
            {[0.25,0.5,1].map(v => (
              <button key={v} onClick={()=>setHydration(h=>Math.min(hydGoal*2,parseFloat((h+v).toFixed(2))))}
                className="px-2 py-1 bg-acard2 text-xs rounded-lg hover:bg-apurple/20 text-gray-300">+{v}L</button>
            ))}
          </div>
        </div>
      </div>

      {/* Daily entry */}
      <div className="bg-acard rounded-2xl p-4">
        <p className="text-sm font-semibold mb-3">Saisie du jour</p>
        <div className="space-y-3">
          <div>
            <label className="text-xs text-gray-400 mb-1 block">Poids aujourd'hui (kg)</label>
            <input value={newWeight} onChange={e => setNewWeight(e.target.value)} type="number" step="0.1"
              className="w-full rounded-xl border border-white/10 px-4 py-2.5 text-sm outline-none focus:border-apurple"
              placeholder={`Ex. ${lastW}`}/>
          </div>
          <div>
            <label className="text-xs text-gray-400 mb-2 block">Forme du jour {formEmoji} — {form}/10</label>
            <input type="range" min="1" max="10" value={form} onChange={e => setForm(+e.target.value)}
              className="w-full" style={{accentColor:'#0DC9AA'}}/>
            <div className="flex justify-between text-xs text-gray-600 mt-1"><span>Épuisé</span><span>Au top</span></div>
          </div>
          <button onClick={saveEntry}
            className={`w-full py-2.5 rounded-xl text-sm font-semibold transition-all ${saved ? 'bg-agreen text-white' : 'bg-apurple hover:bg-apurple/80 text-white'}`}>
            {saved ? '✓ Enregistré !' : t('save',lang)}
          </button>
        </div>
      </div>
    </div>
  );
}

// ─── SHARED CHAT COMPONENT ────────────────────────────────────────────────────

function ChatView({ userId, convList, lang }) {
  const [activeId, setActiveId] = useState(convList[0]?.id || '');
  const [allMsgs, setAllMsgs] = useState(CHATS);
  const [msg, setMsg] = useState('');
  const bottomRef = useRef();

  const msgs = allMsgs[activeId] || [];
  function send() {
    if (!msg.trim()) return;
    const now = new Date(); const hm = `${now.getHours()}h${String(now.getMinutes()).padStart(2,'0')}`;
    setAllMsgs(prev => ({...prev, [activeId]: [...(prev[activeId]||[]), { from:userId, name:'Moi', text:msg, time:hm }]}));
    setMsg(''); setTimeout(() => bottomRef.current?.scrollIntoView({behavior:'smooth'}), 50);
  }

  return (
    <div className="fade-in flex flex-col" style={{minHeight:500}}>
      {/* Conv list */}
      <div className="flex gap-2 mb-3 overflow-x-auto pb-1 scrollbar-hide">
        {convList.map(conv => (
          <button key={conv.id} onClick={() => setActiveId(conv.id)}
            className={`shrink-0 flex items-center gap-2 p-2.5 rounded-xl border transition-all ${activeId===conv.id ? 'border-apurple bg-apurple/10' : 'border-white/10 bg-acard'}`}>
            <div className="relative">
              <div className="w-8 h-8 rounded-full bg-apurple/20 flex items-center justify-center text-sm font-bold shrink-0">
                {conv.isGroup ? '👥' : conv.name[0]}
              </div>
              {conv.online && <div className="pulse-dot absolute -bottom-0.5 -right-0.5"/>}
            </div>
            <div className="text-left">
              <p className="text-xs font-semibold whitespace-nowrap">{conv.name}</p>
              <p className="text-xs text-gray-500 whitespace-nowrap">{conv.sub}</p>
            </div>
          </button>
        ))}
      </div>
      {/* Messages */}
      <div className="flex-1 bg-acard rounded-2xl overflow-y-auto p-4 space-y-3 mb-3" style={{height:320}}>
        {msgs.length === 0 && <p className="text-gray-600 text-sm text-center mt-8">Démarrer la conversation...</p>}
        {msgs.map((m,i) => {
          const isMe = m.from === userId;
          return (
            <div key={i} className={`flex ${isMe ? 'justify-end' : 'justify-start'} gap-2`}>
              {!isMe && <div className="w-6 h-6 rounded-full bg-apurple/20 flex items-center justify-center text-xs shrink-0 mt-1">{m.name?.[0]||'?'}</div>}
              <div className={`max-w-xs ${isMe ? '' : ''}`}>
                {!isMe && <p className="text-xs text-apurpl mb-0.5">{m.name}</p>}
                <div className={`px-3 py-2 rounded-2xl text-sm ${isMe ? 'bg-apurple text-white rounded-br-sm' : 'bg-acard2 text-gray-200 rounded-bl-sm'}`}>
                  <p>{m.text}</p>
                  <p className={`text-xs mt-0.5 ${isMe ? 'text-teal-100' : 'text-gray-500'}`}>{m.time}</p>
                </div>
              </div>
            </div>
          );
        })}
        <div ref={bottomRef}/>
      </div>
      <div className="flex gap-2">
        <input value={msg} onChange={e => setMsg(e.target.value)} onKeyDown={e => e.key==='Enter' && send()}
          className="flex-1 rounded-xl border border-white/10 px-4 py-2.5 text-sm outline-none focus:border-apurple"
          placeholder="Écrire un message..."/>
        <button onClick={send} className="px-4 py-2.5 rounded-xl bg-apurple text-white font-semibold text-sm hover:bg-apurple/80">➤</button>
      </div>
    </div>
  );
}

                {WEEK_KEYS.map((dk,i) => (
                  <td key={i} style={{padding:'2px'}}>
                    <select value={localMenus[dk]?.type || 'normal'}
                      onChange={e => setLocalMenus(prev => ({...prev,[dk]:{...prev[dk],type:e.target.value}}))}
                      style={{width:'100%',background:'#1A1A2E',border:'1px solid rgba(255,255,255,0.1)',borderRadius:6,padding:'3px 4px',fontSize:10,color:'rgba(255,255,255,0.7)',outline:'none'}}>
                      <option value="normal">📋 Normal</option>
                      <option value="charge">🔥 Charge</option>
                      <option value="recup">💚 Récup</option>
                      <option value="match">⚔️ Match</option>
                    </select>
                  </td>
                ))}
              </tr>
              {/* Separator */}
              <tr><td colSpan={8} style={{padding:'2px 0'}}><div style={{height:1,background:'rgba(255,255,255,0.07)'}}/></td></tr>
              {/* Meal rows */}
              {MEAL_KEYS.map((mKey, mIdx) => (
                <tr key={mKey}>
                  <td style={{fontSize:10,color:'rgba(255,255,255,0.4)',paddingRight:6,whiteSpace:'nowrap',fontWeight:500}}>{MEAL_LABELS[mIdx]}</td>
                  {WEEK_KEYS.map((dk,di) => {
                    const rid = localMenus[dk]?.repas?.[mKey];
                    const recipe = rid ? getRecipe(rid) : null;
                    const slotKey = `${dk}-${mKey}`;
                    return (
                      <td key={di} style={{padding:'2px',position:'relative'}}>
                        <button onClick={() => setSelectedSlot(slotKey===selectedSlot ? null : slotKey)}
                          style={{display:'block',width:'100%',textAlign:'left',padding:'4px 5px',borderRadius:6,fontSize:9,minHeight:34,background: selectedSlot===slotKey ? 'rgba(13,201,170,0.12)' : '#1A1A2E',border: selectedSlot===slotKey ? '1px solid #0DC9AA' : '1px solid transparent',cursor:'pointer',overflow:'hidden',whiteSpace:'nowrap',textOverflow:'ellipsis',color:'rgba(255,255,255,0.75)'}}>
                          {recipe ? <>{recipe.img} {recipe.name}</> : <span style={{color:'rgba(255,255,255,0.2)'}}>+ Ajouter</span>}
                        </button>
                        {selectedSlot === slotKey && (
                          <div style={{position:'absolute',top:'100%',left:0,zIndex:20,marginTop:4,background:'#1A1A2E',border:'1px solid rgba(13,201,170,0.3)',borderRadius:12,padding:8,boxShadow:'0 8px 32px rgba(0,0,0,0.6)',width:200}}>
                            <p style={{fontSize:10,color:'rgba(255,255,255,0.4)',marginBottom:6}}>Choisir une recette :</p>
                            <div style={{maxHeight:160,overflowY:'auto'}}>
                              <button onClick={() => assign(dk, mKey, null)} style={{display:'block',width:'100%',textAlign:'left',fontSize:10,padding:'3px 6px',borderRadius:4,color:'rgba(255,255,255,0.3)',background:'transparent',border:'none',cursor:'pointer'}}>— Aucune</button>
                              {RECIPES.map(r => (
                                <button key={r.id} onClick={() => assign(dk, mKey, r.id)}
                                  style={{display:'flex',alignItems:'center',gap:4,width:'100%',textAlign:'left',fontSize:10,padding:'3px 6px',borderRadius:4,color:'rgba(255,255,255,0.75)',background:'transparent',border:'none',cursor:'pointer'}}>
                                  <span>{r.img}</span><span style={{overflow:'hidden',whiteSpace:'nowrap',textOverflow:'ellipsis'}}>{r.name}</span>
                                </button>
                              ))}
                            </div>
                          </div>
                        )}
                      </td>
                    );
                  })}
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    );
  }

  function AdminRecipes() {
    const [filter, setFilter] = useState('Tous');
    const [showNew, setShowNew] = useState(false);
    const cats = ['Tous','Petit déjeuner','Déjeuner','Dîner','Collation'];
    const visible = recipes.filter(r => filter==='Tous' || r.cat===filter);
    return (
      <div className="fade-in">
        <div className="flex justify-between items-center mb-4">
          <h2 className="text-lg font-bold">Gestion des recettes</h2>
          <button onClick={() => setShowNew(!showNew)} className="px-3 py-2 bg-apurple text-white rounded-xl text-xs font-semibold hover:bg-apurple/80">
            + Nouvelle recette
          </button>
        </div>
        {showNew && (
          <div className="bg-acard border border-apurple/20 rounded-2xl p-4 mb-4 fade-in">
            <p className="text-sm font-semibold mb-3">Créer une recette</p>
            <div className="grid grid-cols-2 gap-3">
              <div className="col-span-2">
                <label className="text-xs text-gray-400 mb-1 block">Nom</label>
                <input className="w-full rounded-xl border border-white/10 px-3 py-2 text-sm outline-none focus:border-apurple" placeholder="Nom de la recette"/>
              </div>
              <div>
                <label className="text-xs text-gray-400 mb-1 block">Catégorie</label>
                <select className="w-full rounded-xl border border-white/10 px-3 py-2 text-sm outline-none focus:border-apurple">
                  {cats.slice(1).map(c => <option key={c}>{c}</option>)}
                </select>
              </div>
              <div>
                <label className="text-xs text-gray-400 mb-1 block">Temps (min)</label>
                <input type="number" className="w-full rounded-xl border border-white/10 px-3 py-2 text-sm outline-none focus:border-apurple" placeholder="20"/>
              </div>
              <div><label className="text-xs text-gray-400 mb-1 block">Kcal</label><input type="number" className="w-full rounded-xl border border-white/10 px-3 py-2 text-sm outline-none focus:border-apurple" placeholder="400"/></div>
              <div><label className="text-xs text-gray-400 mb-1 block">Protéines (g)</label><input type="number" className="w-full rounded-xl border border-white/10 px-3 py-2 text-sm outline-none focus:border-apurple" placeholder="30"/></div>
              <div className="col-span-2">
                <label className="text-xs text-gray-400 mb-1 block">Allergènes (séparés par virgule)</label>
                <input className="w-full rounded-xl border border-white/10 px-3 py-2 text-sm outline-none focus:border-apurple" placeholder="gluten, lait, oeuf..."/>
              </div>
              <div className="col-span-2">
                <label className="text-xs text-gray-400 mb-1 block">Ingrédients (un par ligne)</label>
                <textarea rows="3" className="w-full rounded-xl border border-white/10 px-3 py-2 text-sm outline-none focus:border-apurple" placeholder="200g poulet&#10;150g riz..."/>
              </div>
            </div>
            <div className="flex gap-2 mt-3">
              <button className="flex-1 py-2 bg-apurple rounded-xl text-sm font-semibold text-white hover:bg-apurple/80">Enregistrer</button>
              <button onClick={() => setShowNew(false)} className="flex-1 py-2 border border-white/10 rounded-xl text-sm text-gray-400 hover:text-white">Annuler</button>
            </div>
          </div>
        )}
        <div className="flex gap-2 mb-4 overflow-x-auto pb-1">
          {cats.map(c => (
            <button key={c} onClick={() => setFilter(c)}
              className={`shrink-0 px-3 py-1.5 rounded-full text-xs ${filter===c ? 'bg-apurple text-white' : 'bg-acard text-gray-400'}`}>
              {c}
            </button>
          ))}
        </div>
        <div className="space-y-2">
          {visible.map(r => (
            <div key={r.id} className="bg-acard rounded-xl flex items-center gap-3 p-3">
              <span className="text-2xl">{r.img}</span>
              <div className="flex-1 min-w-0">
                <p className="font-medium text-sm truncate">{r.name}</p>
                <p className="text-xs text-gray-400">{r.cat} · {r.time} min · {r.kcal} kcal · {r.p}g prot.</p>
                {r.allergens.length > 0 && (
                  <p className="text-xs text-red-400 mt-0.5">⚠️ {r.allergens.join(', ')}</p>
                )}
              </div>
              <div className="flex gap-1 shrink-0">
                <button className="px-2 py-1 text-xs bg-apurple/20 text-apurpl rounded-lg hover:bg-apurple/30">Modifier</button>
                <button className="px-2 py-1 text-xs bg-red-500/10 text-red-400 rounded-lg hover:bg-red-500/20">Sup.</button>
              </div>
            </div>
          ))}
        </div>
      </div>
    );
  }

  function AdminJoueurs() {
    const [playerList, setPlayerList] = useState(USERS.filter(u=>u.role==='joueur'));
    const [editing, setEditing] = useState(null); // null | 'new' | player object
    const SPORTS = Object.keys(SPORT_ICONS);
    const COACHES = USERS.filter(u => u.role === 'coach');
    const emptyForm = { name:'', sport:'Judo', club:'', category:'', height:'', weight_start:'', weight_target:'', allergies:'', preferences:'', coachId:'' };
    const [form, setForm] = useState(emptyForm);

    function openEdit(p) { setEditing(p); setForm({ ...emptyForm, name:p.name, sport:p.sport||'Judo', club:p.club||'', category:p.category||'', height:p.height||'', weight_start:p.weight_start||'', weight_target:p.weight_target||'', allergies:(p.allergies||[]).join(', '), preferences:(p.preferences||[]).join(', '), coachId:p.coachId||'' }); }
    function openNew() { setEditing('new'); setForm(emptyForm); }
    function saveForm() {
      const base = { role:'joueur', password:'1234', email:form.name.split(' ')[0].toLowerCase(),
        weightHistory:[], todayWeight:parseFloat(form.weight_start)||0, todayForm:7,
        allergies: form.allergies ? form.allergies.split(',').map(s=>s.trim()).filter(Boolean) : [],
        preferences: form.preferences ? form.preferences.split(',').map(s=>s.trim()).filter(Boolean) : [],
        sport:form.sport, name:form.name, club:form.club, category:form.category,
        height:parseFloat(form.height)||0, weight_start:parseFloat(form.weight_start)||0,
        weight_target:parseFloat(form.weight_target)||0,
        coachId: form.coachId ? parseInt(form.coachId) : null,
      };
      if (editing === 'new') {
        const newP = { ...base, id: Date.now() };
        setPlayerList([...playerList, newP]);
      } else {
        setPlayerList(playerList.map(p => p.id === editing.id ? {...p,...base} : p));
      }
      setEditing(null);
    }
    function deleteP(id) { setPlayerList(playerList.filter(p=>p.id!==id)); }

    const f = (k, label, type='text', extra={}) => (
      <div key={k}>
        <label className="text-xs text-gray-400 mb-1 block">{label}</label>
        <input type={type} value={form[k]} onChange={e=>setForm({...form,[k]:e.target.value})}
          className="w-full rounded-xl border border-white/10 px-3 py-2 text-sm outline-none focus:border-apurple" {...extra}/>
      </div>
    );

    return (
      <div className="fade-in space-y-3">
        <div className="flex justify-between items-center mb-2">
          <h2 className="text-lg font-bold">Gestion des joueurs</h2>
          <button onClick={openNew} className="px-3 py-2 bg-apurple text-white rounded-xl text-xs font-semibold hover:bg-apurple/80">+ Ajouter</button>
        </div>

        {editing && (
          <div className="bg-acard border border-apurple/30 rounded-2xl p-4 mb-4 fade-in">
            <p className="font-semibold text-sm mb-3">{editing==='new' ? 'Nouveau joueur' : `Modifier — ${editing.name}`}</p>
            <div className="grid grid-cols-2 gap-3">
              <div className="col-span-2">{f('name','Nom complet')}</div>
              <div>
                <label className="text-xs text-gray-400 mb-1 block">Sport</label>
                <select value={form.sport} onChange={e=>setForm({...form,sport:e.target.value})}
                  className="w-full rounded-xl border border-white/10 px-3 py-2 text-sm outline-none focus:border-apurple">
                  {SPORTS.map(s => <option key={s}>{s}</option>)}
                </select>
              </div>
              {f('club','Club')}
              {f('category','Catégorie')}
              {f('height','Taille (cm)','number')}
              {f('weight_start','Poids départ (kg)','number',{step:'0.1'})}
              {f('weight_target','Poids cible (kg)','number',{step:'0.1'})}
              <div className="col-span-2">
                <label className="text-xs text-gray-400 mb-1 block">Coach attitré</label>
                <select value={form.coachId} onChange={e=>setForm({...form,coachId:e.target.value})}
                  className="w-full rounded-xl border border-white/10 px-3 py-2 text-sm outline-none focus:border-apurple">
                  <option value=''>-- Aucun coach --</option>
                  {COACHES.map(c => <option key={c.id} value={c.id}>{c.name}{c.club ? ` (${c.club})` : ''}</option>)}
                </select>
              </div>
              <div className="col-span-2">{f('allergies','Allergies (séparées par virgule)')}</div>
              <div className="col-span-2">{f('preferences','Préférences alimentaires (séparées par virgule)')}</div>
            </div>
            <div className="flex gap-2 mt-3">
              <button onClick={saveForm} className="flex-1 py-2 bg-apurple rounded-xl text-sm font-semibold text-white hover:bg-apurple/80">Enregistrer</button>
              <button onClick={() => setEditing(null)} className="flex-1 py-2 border border-white/10 rounded-xl text-sm text-gray-400 hover:text-white">Annuler</button>
            </div>
          </div>
        )}

        {playerList.map(p => (
          <div key={p.id} className="bg-acard rounded-2xl p-4">
            <div className="flex justify-between items-start">
              <div className="flex-1 min-w-0">
                <div className="flex items-center gap-2">
                  <span className="text-xl">{getSportIcon(p.sport)}</span>
                  <div>
                    <p className="font-semibold">{p.name}</p>
                    <p className="text-xs text-gray-400">{p.club} · {p.category} · {p.height}cm</p>
                  </div>
                </div>
                <div className="flex items-center gap-3 mt-1.5 text-xs text-gray-500">
                  <span>Départ : <span className="text-gray-300">{p.weight_start}kg</span></span>
                  <span>→</span>
                  <span>Cible : <span className="text-agreen font-semibold">{p.weight_target}kg</span></span>
                  {p.coachId && (() => { const c = USERS.find(u=>u.id===p.coachId); return c ? <span className="text-apurpl">· 👤 {c.name}</span> : null; })()}
                </div>
                <div className="flex flex-wrap gap-1 mt-1.5">
                  {(p.allergies||[]).map(a => <span key={a} className="text-xs bg-red-500/20 text-red-400 px-2 py-0.5 rounded-full">⚠️ {a}</span>)}
                  {(p.preferences||[]).map(a => <span key={a} className="text-xs bg-agreen/20 text-agreen px-2 py-0.5 rounded-full">{a}</span>)}
                </div>
              </div>
              <div className="flex gap-1 shrink-0 ml-2">
                <button onClick={() => openEdit(p)} className="text-xs text-apurpl px-2 py-1.5 bg-apurple/10 rounded-xl hover:bg-apurple/20">Modifier</button>
                <button onClick={() => deleteP(p.id)} className="text-xs text-red-400 px-2 py-1.5 bg-red-500/10 rounded-xl hover:bg-red-500/20">Sup.</button>
              </div>
            </div>
          </div>
        ))}
      </div>
    );
  }

  return (
    <div>
      <AdminNav/>
      <main className="max-w-4xl mx-auto px-4" style={{paddingTop:'5rem'}}>
        {tab==='dashboard'   && <AdminDashboard/>}
        {tab==='suivi'       && !adminSelectedPlayer && <AdminSuivi/>}
        {tab==='suivi-detail' && adminSelectedPlayer && <AdminPlayerDetail player={adminSelectedPlayer}/>}
        {tab==='menus'       && <AdminMenus/>}
        {tab==='recettes'    && <AdminRecipes/>}
        {tab==='joueurs'     && <AdminJoueurs/>}
      </main>
    </div>
  );
}

// ─── ROOT ─────────────────────────────────────────────────────────────────────

function App() {
  const [user, setUser] = useState(null);
  if (!user) return <Login onLogin={setUser}/>;
  if (user.role === 'joueur') return <PlayerApp user={user} onLogout={() => setUser(null)}/>;
  if (user.role === 'coach')  return <CoachApp  user={user} onLogout={() => setUser(null)}/>;
  if (user.role === 'expert') return <PlayerApp user={{...user, role:'joueur', weightHistory:[{date:'29/06',w:75}], weight_start:75, weight_target:70, height:180, todayWeight:75, todayForm:9, sport:'Judo', category:'Expert', coachId:3}} onLogout={() => setUser(null)}/>;
  if (user.role === 'admin')  return <AdminApp  user={user} onLogout={() => setUser(null)}/>;
  return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
